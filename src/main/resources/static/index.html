<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加人员</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6fa; display: flex; justify-content: center; padding: 40px 16px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 36px 40px; width: 100%; max-width: 480px; }
    h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    label .required { color: #e74c3c; margin-left: 2px; }
    label .optional { color: #aaa; font-size: 12px; margin-left: 4px; }
    input[type="text"], input[type="email"], input[type="tel"] {
      width: 100%; padding: 10px 14px; border: 1px solid #dde1e7; border-radius: 8px;
      font-size: 14px; color: #333; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: #4f6ef7; }

    /* Avatar upload */
    .avatar-upload { display: flex; align-items: center; gap: 16px; }
    .avatar-preview {
      width: 72px; height: 72px; border-radius: 50%; background: #eef0f5;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0; border: 2px dashed #c8cdd8;
    }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .avatar-preview .placeholder { font-size: 28px; color: #b0b8c8; user-select: none; }
    .avatar-actions { display: flex; flex-direction: column; gap: 8px; }
    .btn-upload {
      display: inline-block; padding: 8px 16px; background: #f0f2ff; color: #4f6ef7;
      border: 1px solid #c5ccff; border-radius: 6px; font-size: 13px; cursor: pointer;
      text-align: center; transition: background .2s;
    }
    .btn-upload:hover { background: #e2e6ff; }
    .avatar-hint { font-size: 12px; color: #aaa; }
    input[type="file"] { display: none; }

    .form-actions { margin-top: 28px; display: flex; gap: 12px; justify-content: flex-end; }
    .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; transition: opacity .2s; }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary { background: #f0f2f5; color: #555; }
    .btn-secondary:hover { background: #e4e6ea; }

    .person-list { margin-top: 32px; }
    .person-list h3 { font-size: 15px; color: #555; margin-bottom: 12px; }
    .person-item {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; background: #fafbff;
    }
    .person-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #e0e4f5;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      overflow: hidden; flex-shrink: 0;
    }
    .person-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .person-info .name { font-size: 14px; font-weight: 600; color: #222; }
    .person-info .meta { font-size: 12px; color: #888; margin-top: 2px; }

    .toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      background: #323232; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="card">
  <h2>添加人员</h2>
  <form id="personForm">
    <!-- Avatar -->
    <div class="form-group">
      <label>头像<span class="optional">（可选）</span></label>
      <div class="avatar-upload">
        <div class="avatar-preview" id="avatarPreview">
          <span class="placeholder">&#128100;</span>
          <img id="avatarImg" src="" alt="头像预览">
        </div>
        <div class="avatar-actions">
          <label class="btn-upload" for="avatarInput">选择图片</label>
          <input type="file" id="avatarInput" accept="image/*">
          <span class="avatar-hint">支持 JPG、PNG，建议正方形</span>
          <span id="clearAvatar" style="font-size:12px;color:#e74c3c;cursor:pointer;display:none;" onclick="clearAvatarFn()">移除头像</span>
        </div>
      </div>
    </div>

    <!-- Name -->
    <div class="form-group">
      <label for="name">姓名<span class="required">*</span></label>
      <input type="text" id="name" placeholder="请输入姓名" required>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">邮箱<span class="required">*</span></label>
      <input type="email" id="email" placeholder="请输入邮箱" required>
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label for="phone">手机号<span class="optional">（可选）</span></label>
      <input type="tel" id="phone" placeholder="请输入手机号">
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" onclick="resetForm()">重置</button>
      <button type="submit" class="btn btn-primary">添加</button>
    </div>
  </form>

  <div class="person-list" id="personList" style="display:none;">
    <h3>已添加人员</h3>
    <div id="personItems"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const avatarInput = document.getElementById('avatarInput');
  const avatarImg = document.getElementById('avatarImg');
  const avatarPreview = document.getElementById('avatarPreview');
  const clearBtn = document.getElementById('clearAvatar');
  let avatarFile = null;

  avatarInput.addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    avatarFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      avatarImg.src = e.target.result;
      avatarImg.style.display = 'block';
      avatarPreview.querySelector('.placeholder').style.display = 'none';
      clearBtn.style.display = 'inline';
    };
    reader.readAsDataURL(file);
  });

  function clearAvatarFn() {
    avatarFile = null;
    avatarInput.value = '';
    avatarImg.src = '';
    avatarImg.style.display = 'none';
    avatarPreview.querySelector('.placeholder').style.display = '';
    clearBtn.style.display = 'none';
  }

  function resetForm() {
    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('phone').value = '';
    clearAvatarFn();
  }

  document.getElementById('personForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!name || !email) { showToast('请填写必填项'); return; }

    const formData = new FormData();
    formData.append('name', name);
    formData.append('email', email);
    if (phone) formData.append('phone', phone);
    if (avatarFile) formData.append('avatar', avatarFile);

    try {
      const res = await fetch('/api/persons', { method: 'POST', body: formData });
      if (!res.ok) throw new Error('请求失败');
      const person = await res.json();
      showToast('添加成功');
      resetForm();
      renderPerson(person);
    } catch (err) {
      showToast('添加失败，请重试');
    }
  });

  function renderPerson(p) {
    const list = document.getElementById('personList');
    const items = document.getElementById('personItems');
    list.style.display = '';
    const div = document.createElement('div');
    div.className = 'person-item';
    const avatarHtml = p.avatarUrl
      ? `<div class="person-avatar"><img src="${p.avatarUrl}" alt="头像"></div>`
      : `<div class="person-avatar">&#128100;</div>`;
    div.innerHTML = `${avatarHtml}<div class="person-info"><div class="name">${p.name}</div><div class="meta">${p.email}${p.phone ? ' · ' + p.phone : ''}</div></div>`;
    items.prepend(div);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
